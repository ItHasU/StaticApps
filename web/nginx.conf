server {
    listen 80;
    server_name _;

    # /data est servi tel quel : le menu (index.html), style.css et les
    # apps (apps/<slug>/) y cohabitent directement, sans alias ni route
    # dédiée à ajouter à chaque évolution de la structure.
    root /data;
    index index.html;

    # En-têtes de sécurité (5.6.6)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Historique du menu : navigable publiquement.
    location /history/ {
        autoindex on;
    }

    # Défense en profondeur globale : nginx:alpine n'a pas de module PHP,
    # mais on bloque explicitement toute tentative d'accès à un .php, où
    # que ce soit sous /data.
    location ~* \.php[0-9]?$ {
        deny all;
    }

    # Aucun fichier/dossier caché n'est jamais exposé (état admin, etc.).
    location ~ /\. {
        deny all;
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
