version: "3.8"

services:
  web:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - apps-data:/data:ro
      - ./web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Pas de port publié : routé par le reverse proxy existant
    networks:
      - proxy-network

  admin:
    image: ghcr.io/ithasu/staticapps-admin:latest
    # En local/dev, remplacer la ligne ci-dessus par `build: ./admin`
    # pour itérer sans passer par le registre.
    restart: unless-stopped
    environment:
      - ADMIN_PASSWORD_HASH=${ADMIN_PASSWORD_HASH}
      - SESSION_SECRET=${SESSION_SECRET}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-50}
    volumes:
      - apps-data:/data
    # Pas de port publié : routé par le reverse proxy existant,
    # idéalement sur un sous-domaine ou chemin dédié distinct de `web`
    networks:
      - proxy-network

volumes:
  apps-data:

networks:
  proxy-network:
    external: true # réseau déjà utilisé par le reverse proxy existant
