name: Publish admin image

on:
  push:
    branches: [main]
    paths:
      - "admin/**"
      - ".github/workflows/publish-admin.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ghcr.io exige un nom d'image en minuscules ; github.repository
      # conserve la casse du dépôt, donc on la normalise ici.
      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./admin
          push: true
          tags: |
            ghcr.io/${{ steps.image.outputs.name }}-admin:latest
            ghcr.io/${{ steps.image.outputs.name }}-admin:${{ github.sha }}
