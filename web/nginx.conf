server {
    listen 80;
    server_name _;

    root /data/portal;
    index index.html;

    # En-têtes de sécurité (5.6.6)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Menu public (généré par admin) et son historique
    location = / {
        try_files /index.html =404;
    }

    location /style.css {
        try_files /style.css =404;
    }

    location /history/ {
        alias /data/portal/history/;
        autoindex on;
    }

    # Apps statiques
    location /apps/ {
        alias /data/apps/;
        autoindex off;
        try_files $uri $uri/ $uri/index.html =404;

        # Défense en profondeur : aucun fichier .php (ou autre script)
        # ne doit jamais être interprété, quel que soit son contenu.
        location ~* \.php[0-9]?$ {
            deny all;
        }
    }

    # Défense en profondeur globale : nginx:alpine n'a pas de module PHP,
    # mais on bloque explicitement toute tentative d'accès à un .php.
    location ~* \.php[0-9]?$ {
        deny all;
    }

    location ~ /\. {
        deny all;
    }
}
